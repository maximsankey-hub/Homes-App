name: Supabase DB keep-alive

on:
  schedule:
    # Every other day at 09:00 UTC. Supabase free-tier projects auto-pause
    # after 7 days of no DB activity, so this pings well within that window.
    - cron: "0 9 */2 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health/db
        run: |
          for attempt in 1 2; do
            status=$(curl -s -o response.txt -w "%{http_code}" https://homes-app-client-max-jen.vercel.app/api/health/db)
            body=$(cat response.txt)
            echo "Attempt $attempt: HTTP $status, body: $body"
            if [ "$status" = "200" ]; then
              exit 0
            fi
            echo "Ping failed, the DB may be waking up from a pause — retrying in 15s..."
            sleep 15
          done
          echo "::error::DB keep-alive ping failed after retry (HTTP $status). Check the Supabase dashboard."
          exit 1
